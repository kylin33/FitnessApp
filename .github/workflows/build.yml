name: Build Android APK
on: [push, workflow_dispatch] # workflow_dispatch 允许你手动在网页上点运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 补充安卓打包必备的 Java 环境 (推荐 Java 17)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: |
          pip install -U pip
          pip install -r requirements.txt

      # 2. 关键修复：用 yes | 自动回答所有 [y/n] 提示
      - name: Build APK
        run: yes | flet build apk -v --yes .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/**/*.apk
